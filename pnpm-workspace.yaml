# pnpm-workspace.yaml
# Amanah Governance Platform — pnpm monorepo workspace
# Phase 2: Three apps + shared packages
#
# Apps:
#   apps/user  (AmanahHub — public donor app, port 3300)
#   apps/admin (AmanahHub Console — reviewer/admin app, port 3301)
#   apps/org   (amanahOS — org governance workspace, port 3302)  ← NEW Phase 2
#
# Packages:
#   packages/config     (@agp/config)
#   packages/scoring    (@agp/scoring)
#   packages/validation (@agp/validation)

packages:
  - "apps/*"
  - "packages/*"
