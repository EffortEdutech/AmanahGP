# =============================================================
# Amanah Governance Platform — supabase/config.toml
# Updated: local app ports changed to 3300 (user) / 3301 (admin)
# =============================================================

[api]
enabled = true
port = 54421
schemas = ["public", "graphql_public"]
extra_search_path = ["public", "extensions"]
max_rows = 1000

[db]
port = 54422
shadow_port = 54420
major_version = 15

[studio]
enabled = true
port = 54423
api_url = "http://127.0.0.1"

[inbucket]
enabled = true
port = 54424
smtp_port = 54425
pop3_port = 54426

[storage]
enabled = true
file_size_limit = "50MiB"

[storage.buckets.evidence]
public = false
file_size_limit = "20MiB"
allowed_mime_types = [
  "image/jpeg",
  "image/png",
  "image/webp",
  "application/pdf",
  "video/mp4",
]

[auth]
enabled = true
site_url = "http://localhost:3300"
additional_redirect_urls = [
  "http://localhost:3300/**",
  "http://localhost:3301/**",
  "http://127.0.0.1:3300/**",
  "http://127.0.0.1:3301/**"
]
jwt_expiry = 3600
enable_refresh_token_rotation = true
refresh_token_reuse_interval = 10
enable_signup = true
enable_anonymous_sign_ins = false
minimum_password_length = 8

[auth.email]
enable_signup = true
double_confirm_changes = true
enable_confirmations = false

[auth.sms]
enable_signup = false

[edge_runtime]
enabled = true
policy = "oneshot"
inspector_port = 8083

[analytics]
enabled = false
